name: Auto-Merge Bot PRs

on:
  pull_request:
    types: [opened, synchronize, labeled]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto-merge when checks pass
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'jules[bot]' ||
      github.event.pull_request.user.login == 'github-actions[bot]' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    steps:
      - name: Approve and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          gh pr review "$PR" --repo "$REPO" --approve --body "Auto-approved" 2>/dev/null || true
          gh pr merge "$PR" --repo "$REPO" --squash --auto 2>&1 || echo "Auto-merge enabled"
