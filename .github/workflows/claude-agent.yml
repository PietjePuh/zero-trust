name: Claude Code Agent

# DISABLED - tokens depleted, re-enable when budget restored
# Original triggers:
# on:
#   issues:
#     types: [opened, labeled]
#   issue_comment:
#     types: [created]
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude-agent:
    name: Claude Code Agent
    runs-on: self-hosted
    timeout-minutes: 60
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: $ secrets.CLAUDE_CODE_OAUTH_TOKEN 
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 50 --allowed-tools Bash Edit Read Write Glob Grep WebFetch"
          prompt: |
            You are an autonomous coding agent. Read any CLAUDE.md or README.md for project context.
            Implement the fix or feature described in the issue.
            Create a focused PR with clear title and description.
            Add labels: auto-merge, ai-suggested.
