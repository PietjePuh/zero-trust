name: Claude Code Review

# DISABLED - tokens depleted, re-enable when budget restored
# Original triggers:
# on:
#   pull_request:
#     types: [opened, synchronize, ready_for_review, reopened]
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-$ github.event.pull_request.number 
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: self-hosted
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: $ secrets.CLAUDE_CODE_OAUTH_TOKEN 
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 5 --allowed-tools Bash Read Glob Grep"
          prompt: |
            Review this PR for:
            1. Security issues (injection, XSS, secret exposure)
            2. Code quality and potential bugs
            3. Error handling
            Be concise. Only flag real issues, not style nits.
