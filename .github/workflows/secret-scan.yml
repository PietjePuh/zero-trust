name: secret-scan

# Block PRs that introduce key-shaped secrets. gitleaks scans the PR's commits;
# historical leaks are out of scope (handle via git-filter-repo separately).

on:
  pull_request: {}

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: "true"
