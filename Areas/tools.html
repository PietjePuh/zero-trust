<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Tools - Zero Trust</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header style="padding: 4rem 1rem;">
    <div class="nav-bar">
        <a href="../index.html">Home</a>
        <a href="#" class="active">Tools</a>
        <a href="cheatsheets.html">Cheatsheets</a>
        <a href="ai.html">AI Hub</a>
        <a href="../Resources/index.html">Resources</a>
        <a href="../Projects/index.html">Projects</a>
    </div>
    <h1>Security Tools Index</h1>
    <p>A curated list of SOC, OSINT, and Offensive Security tools.</p>
  </header>

  <main>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search tools, categories, or keywords...">

        <div class="category-filters" style="margin-top: 1rem; display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
            <button class="button button-secondary filter-btn active" data-filter="all">All</button>
            <button class="button button-secondary filter-btn" data-filter="Networking">Networking</button>
            <button class="button button-secondary filter-btn" data-filter="Web">Web</button>
            <button class="button button-secondary filter-btn" data-filter="Exploitation">Exploitation</button>
            <button class="button button-secondary filter-btn" data-filter="Forensics">Forensics</button>
            <button class="button button-secondary filter-btn" data-filter="OSINT">OSINT</button>
            <button class="button button-secondary filter-btn" data-filter="AI">AI</button>
        </div>
    </div>

    <div id="toolsGrid" class="grid-container">
        <!-- Tools loaded via JS -->
    </div>
  </main>

  <footer>
    <p>&copy; Zero Trust. Hosted with ❤️ on GitHub Pages.</p>
  </footer>

  <script src="data/tools.js"></script>
  <script>
    const searchInput = document.getElementById('searchInput');
    const grid = document.getElementById('toolsGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentCategory = 'all';

    // Initialize Tools
    if (typeof toolsData !== 'undefined') {
        toolsData.forEach(tool => {
            if (tool.featured) {
                const link = document.createElement('a');
                link.href = tool.link;
                link.className = 'tool-card featured-card';
                link.style.textDecoration = 'none';
                link.style.borderColor = 'var(--accent-color)';
                // Featured cards don't have standard category filters applied the same way usually,
                // but we can add data attributes if needed.
                link.innerHTML = `
                    <div class="tool-header">
                        <h3 class="tool-title">${tool.title}</h3>
                        <span class="tool-category cat-exp">${tool.category} Tool</span>
                    </div>
                    <div class="tool-desc">${tool.description}</div>
                `;
                // Add hidden data for searching
                link.setAttribute('data-keywords', tool.keywords || '');
                link.setAttribute('data-category', tool.category);
                grid.appendChild(link);
            } else {
                const card = document.createElement('div');
                card.className = 'tool-card';

                // Determine category class for color
                let catClass = 'cat-net'; // Default
                const c = tool.category.toLowerCase();
                if (c.includes('web')) catClass = 'cat-web';
                if (c.includes('exploit')) catClass = 'cat-exp';
                if (c.includes('forensics')) catClass = 'cat-for';
                if (c.includes('osint')) catClass = 'cat-osint';
                if (c.includes('ai')) catClass = 'cat-exp'; // Re-use exp for AI

                let content = `
                    <div class="tool-header">
                        <h3 class="tool-title">${tool.title}</h3>
                        <span class="tool-category ${catClass}">${tool.category}</span>
                    </div>
                    <div class="tool-desc">${tool.description}</div>
                `;

                if (tool.flags) {
                    content += `<div class="tool-flags">${tool.flags}</div>`;
                }

                if (tool.isIndex) {
                    content = `
                    <div class="tool-header">
                        <h3 class="tool-title">${tool.title}</h3>
                        <span class="tool-category cat-exp">${tool.category}</span>
                    </div>
                    <div class="tool-desc">
                        <p><strong>Networking:</strong> Socat, SSH, OpenVPN, TCPDump, TShark, Zeek, Snort, Suricata, Nagios, Zscaler, Proxmox, Kubernetes, Docker.</p>
                        <p><strong>Web:</strong> OWASP ZAP, Caido, WPScan, Feroxbuster, Dirb, Nikto, WhatWeb, ffuf, EvilGinx2, GoPhish.</p>
                        <p><strong>Enumeration:</strong> Masscan, RustScan, Enum4linux, AdGuard, DNSRecon, NSLookup, Dig, Whois, Amass.</p>
                        <p><strong>Exploitation:</strong> CrackMapExec (NetExec), Impacket, Responder, Mimikatz.</p>
                        <p><strong>Forensics:</strong> Rekall, GRR, KAPE, Zimmerman Tools, ExifTool, Binwalk, Strings, FLOSS, PEStudio, ProcMon.</p>
                        <p><strong>OSINT:</strong> Holehe, PhoneInfoga, Waybackurls, Gowitness.</p>
                        <p><strong>AI/Misc:</strong> AI Terminal, AutoHotkey, Tmux, Duplicati, Flameshot.</p>
                    </div>
                    `;
                }

                card.innerHTML = content;
                // Add hidden data for searching
                card.setAttribute('data-keywords', tool.keywords || '');
                card.setAttribute('data-category', tool.category);

                grid.appendChild(card);
            }
        });
    }

    function filterTools() {
        const searchTerm = searchInput.value.toLowerCase();
        const cards = document.querySelectorAll('.tool-card'); // Re-select generated cards

        cards.forEach(card => {
            const title = card.querySelector('.tool-title').textContent.toLowerCase();
            const desc = card.querySelector('.tool-desc').textContent.toLowerCase();
            const flags = card.querySelector('.tool-flags') ? card.querySelector('.tool-flags').textContent.toLowerCase() : '';
            const keywords = card.getAttribute('data-keywords') ? card.getAttribute('data-keywords').toLowerCase() : '';
            const categoryAttr = card.getAttribute('data-category') || '';

            const matchesSearch = title.includes(searchTerm) || keywords.includes(searchTerm) || desc.includes(searchTerm) || flags.includes(searchTerm);
            const matchesCategory = currentCategory === 'all' || categoryAttr.includes(currentCategory);

            if (matchesSearch && matchesCategory) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }

    // Category Filters
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Update active state
            filterBtns.forEach(b => b.classList.remove('active'));
            filterBtns.forEach(b => b.style.backgroundColor = ''); // Reset inline styles if any

            btn.classList.add('active');
            btn.style.backgroundColor = 'var(--accent-color)'; // Highlight active

            currentCategory = btn.getAttribute('data-filter');
            filterTools();
        });
    });

    // Check for query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    if (query) {
        searchInput.value = query;
        filterTools();
    }

    searchInput.addEventListener('input', () => {
        filterTools();
    });

    // Initialize first button style
    document.querySelector('.filter-btn[data-filter="all"]').style.backgroundColor = 'var(--accent-color)';
  </script>
</body>
</html>
